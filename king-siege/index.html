<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a2a1f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="King's Siege">
<title>King's Siege</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="dev"></div>

<!-- HUD -->
<div id="hud">
  <div class="bar-wrap">
    <div class="bar-label"><span id="gateLbl">Gate</span><span id="gateNum">300/300</span></div>
    <div class="bar-bg"><div class="bar-fill gate" id="gateBar" style="width:100%"></div></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-label"><span id="hpLbl">King</span><span id="hpNum">100/100</span></div>
    <div class="bar-bg"><div class="bar-fill hp" id="hpBar" style="width:100%"></div></div>
  </div>
  <div id="hudRight">
    <span id="waveLabel">Wave 1</span>
    <span id="goldLabel">0</span>
  </div>
  <button id="pauseBtn">||</button>
</div>

<div id="banner"></div>
<div id="floatTexts"></div>

<div class="modal hidden" id="updateToast" style="align-items:flex-end;justify-content:center;background:transparent;pointer-events:none;">
  <div class="card" style="pointer-events:auto;max-width:340px;padding:14px 16px;margin-bottom:110px;display:flex;align-items:center;gap:12px;">
    <span id="updateMsg" style="flex:1;text-align:start;font-size:14px;">New update available</span>
    <button class="bigbtn" id="updateReloadBtn" style="width:auto;margin:0;padding:9px 14px;font-size:13px;">Reload</button>
  </div>
</div>

<!-- virtual joysticks -->
<div class="stick-base" id="moveBase"></div>
<div class="stick-nub" id="moveNub"></div>
<div class="stick-base" id="aimBase"></div>
<div class="stick-nub" id="aimNub"></div>

<!-- bottom action bar -->
<div id="actionbar">
  <button class="actbtn" id="trapBtn1" data-trap="spike"><div class="cd" id="cd1"></div><span>⛏</span><span class="key">1</span></button>
  <button class="actbtn" id="trapBtn2" data-trap="barrel"><div class="cd" id="cd2"></div><span>🛢</span><span class="key">2</span></button>
  <button class="actbtn" id="trapBtn3" data-trap="tower"><div class="cd" id="cd3"></div><span>🏹</span><span class="key">3</span></button>
  <button class="actbtn dash" id="dashBtn"><div class="cd" id="cdDash"></div><span>⚡</span><span class="key" id="dashKey">Space</span></button>
</div>

<!-- start modal -->
<div class="modal" id="startModal">
  <button class="langbtn" id="langBtn1">English</button>
  <div class="card">
    <h1 id="startTitle">King's Siege</h1>
    <p class="sub" id="startSub">Defend the gate</p>
    <p class="howto" id="howto"></p>
    <button class="bigbtn" id="playBtn">Play</button>
  </div>
</div>

<!-- pause modal -->
<div class="modal hidden" id="pauseModal">
  <div class="card">
    <h1 id="pauseTitle">Paused</h1>
    <button class="bigbtn" id="resumeBtn">Resume</button>
    <button class="bigbtn secondary" id="restartFromPauseBtn">Restart</button>
    <button class="bigbtn ghost" id="menuFromPauseBtn">Main menu</button>
  </div>
</div>

<!-- shop modal -->
<div class="modal hidden" id="shopModal">
  <div class="card">
    <h1 id="shopTitle">Upgrade Shop</h1>
    <p class="sub" id="shopSub">Spend gold</p>
    <div class="upgrades" id="upgradeList"></div>
    <button class="bigbtn ghost" id="rerollBtn">Reroll (free)</button>
    <button class="bigbtn" id="nextWaveBtn">Next wave</button>
  </div>
</div>

<!-- game over modal -->
<div class="modal hidden" id="gameOverModal">
  <div class="card">
    <h1 id="goTitle">The gate has fallen</h1>
    <p class="sub" id="goSub">You held the line until wave 1</p>
    <p class="sub" id="goBest"></p>
    <button class="bigbtn" id="restartBtn">Restart</button>
    <button class="bigbtn ghost" id="menuFromGoBtn">Main menu</button>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
